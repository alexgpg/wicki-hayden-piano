<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wicki–Hayden Piano</title>
<style>
  :root {
    --key: 66px;
    --gap: 7px;
    --unit: calc(var(--key) + var(--gap));
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #1c2230, #0d0f14 70%);
    color: #e7ebf3;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    gap: 22px;
  }
  header { text-align: center; }
  h1 {
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 650;
    letter-spacing: .3px;
  }
  .sub {
    margin: 0;
    font-size: 13px;
    color: #8791a5;
  }
  .sub kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #232a38;
    border: 1px solid #333c4e;
    border-radius: 5px;
    padding: 1px 6px;
    font-size: 12px;
    color: #cdd6e6;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 14px;
    color: #aeb7c8;
  }
  .controls .label { letter-spacing: .3px; }
  .controls button:not(.chip) {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid #333c4e;
    background: linear-gradient(#2a3140, #212734);
    color: #e7ebf3;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    transition: background .08s ease, opacity .08s ease;
  }
  .controls button:not(.chip):hover:not(:disabled) { background: linear-gradient(#323b4d, #262d3b); }
  .controls button:not(.chip):disabled { opacity: .35; cursor: default; }
  .controls .readout {
    min-width: 30px;
    text-align: center;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 16px;
    font-weight: 600;
    color: #e7ebf3;
  }
  .chip {
    padding: 6px 11px;
    border-radius: 8px;
    border: 1px solid #333c4e;
    background: linear-gradient(#2a3140, #212734);
    color: #cdd6e6;
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: nowrap;
    flex: none;
    cursor: pointer;
    transition: background .08s ease, border-color .08s ease, color .08s ease;
  }
  .chip:hover { background: linear-gradient(#323b4d, #262d3b); }
  .chip.active {
    background: linear-gradient(#6c9bff, #3f6fe0);
    border-color: #a6c2ff;
    color: #fff;
  }
  .controls .hint { font-size: 12px; color: #7f8aa0; }
  .board {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    padding: 22px;
    background: linear-gradient(#161a22, #0f131a);
    border: 1px solid #262d3a;
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }
  .row { display: flex; gap: var(--gap); }
  .key {
    position: relative;
    width: var(--key);
    height: var(--key);
    border-radius: 10px;
    background: linear-gradient(#2a3140, #212734);
    border: 1px solid #3a4356;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: transform .04s ease, box-shadow .08s ease, background .08s ease;
  }
  .key.sharp {
    background: linear-gradient(#191d27, #12161e);
    border-color: #2a3140;
    color: #aeb7c8;
  }
  .key .qwerty {
    position: absolute;
    top: 5px;
    left: 7px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    opacity: .45;
  }
  .key .note {
    font-size: 21px;
    font-weight: 650;
    line-height: 1;
  }
  .key .oct {
    font-size: 12px;
    font-weight: 500;
    opacity: .55;
    margin-left: 1px;
    align-self: flex-end;
    padding-bottom: 3px;
  }
  .key.active {
    background: linear-gradient(#6c9bff, #3f6fe0);
    border-color: #a6c2ff;
    color: #fff;
    transform: translateY(1px);
    box-shadow: 0 0 20px rgba(96,140,255,.65);
  }
  .key.active .qwerty, .key.active .oct { opacity: .85; }

  .help {
    width: min(760px, 92vw);
    background: linear-gradient(#141821, #0e121a);
    border: 1px solid #262d3a;
    border-radius: 14px;
    padding: 2px 20px 18px;
  }
  .help summary {
    cursor: pointer;
    list-style: none;
    padding: 14px 0 4px;
    font-size: 15px;
    font-weight: 600;
    color: #cdd6e6;
    user-select: none;
  }
  .help summary::-webkit-details-marker { display: none; }
  .help summary::before {
    content: '▸';
    display: inline-block;
    margin-right: 8px;
    color: #7f8aa0;
    transition: transform .15s ease;
  }
  .help[open] summary::before { transform: rotate(90deg); }
  .help .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    font-size: 12px;
    color: #8791a5;
    margin: 6px 0 4px;
  }
  .help .legend .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .group-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #7f8aa0;
    margin: 16px 0 8px;
  }
  .cards { display: flex; flex-wrap: wrap; gap: 12px; }
  .card {
    width: 120px;
    background: #1b2029;
    border: 1px solid #2a313f;
    border-radius: 10px;
    padding: 10px 8px 8px;
    text-align: center;
  }
  .card svg { width: 100%; height: auto; display: block; }
  .card .name { font-size: 13px; font-weight: 600; margin-top: 6px; color: #e7ebf3; }
  .card .ex {
    margin-top: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    color: #9aa4b8;
  }
  .card .ex span {
    background: #232a38;
    border: 1px solid #333c4e;
    border-radius: 4px;
    padding: 1px 5px;
    color: #cdd6e6;
  }
</style>
</head>
<body>
  <header>
    <h1>Wicki–Hayden Piano</h1>
    <p class="sub">Play with your keyboard. Right = whole tone · up-right = a fifth. <kbd>Z</kbd> = C4.</p>
  </header>
  <div class="controls">
    <span class="label">Octave</span>
    <button id="octDown" aria-label="Octave down">−</button>
    <span class="readout" id="octReadout">0</span>
    <button id="octUp" aria-label="Octave up">+</button>
  </div>
  <div class="controls">
    <span class="label">Chord</span>
    <button class="chip" data-code="F1">F1 · maj</button>
    <button class="chip" data-code="F2">F2 · min</button>
    <button class="chip" data-code="F3">F3 · 7</button>
    <button class="chip" data-code="F4">F4 · sus4</button>
    <span class="hint">hold (or click) + play a key</span>
  </div>
  <div class="board" id="board"></div>

  <details class="help" open>
    <summary>Chord &amp; interval shapes</summary>
    <div class="legend">
      <span><span class="dot" style="background:#ffb454"></span>root</span>
      <span><span class="dot" style="background:#6c9bff"></span>added note</span>
      <span>The same shape plays the same chord anywhere on the board.</span>
    </div>
    <div id="helpBody"></div>
  </details>

<script>
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

  // Rows in display order (top → bottom), each a whole-tone run.
  // base = semitone offset of the leftmost key from C4 (MIDI 60).
  // indent = QWERTY-style horizontal stagger, in key-units.
  const ROWS = [
    { base: 21, indent: 0.00, keys: [['Digit1','1'],['Digit2','2'],['Digit3','3'],['Digit4','4'],['Digit5','5'],['Digit6','6'],['Digit7','7'],['Digit8','8'],['Digit9','9'],['Digit0','0']] },
    { base: 14, indent: 0.55, keys: [['KeyQ','Q'],['KeyW','W'],['KeyE','E'],['KeyR','R'],['KeyT','T'],['KeyY','Y'],['KeyU','U'],['KeyI','I'],['KeyO','O'],['KeyP','P']] },
    { base:  7, indent: 0.80, keys: [['KeyA','A'],['KeyS','S'],['KeyD','D'],['KeyF','F'],['KeyG','G'],['KeyH','H'],['KeyJ','J'],['KeyK','K'],['KeyL','L'],['Semicolon',';']] },
    { base:  0, indent: 1.30, keys: [['KeyZ','Z'],['KeyX','X'],['KeyC','C'],['KeyV','V'],['KeyB','B'],['KeyN','N'],['KeyM','M'],['Comma',','],['Period','.'],['Slash','/']] },
  ];

  const board = document.getElementById('board');
  const keyEls = new Map(); // event.code -> element

  for (const row of ROWS) {
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    rowEl.style.marginLeft = `calc(var(--unit) * ${row.indent})`;
    row.keys.forEach(([code, label], i) => {
      const midi = 60 + row.base + i * 2;
      const name = NOTE_NAMES[midi % 12];
      const octave = Math.floor(midi / 12) - 1;
      const isSharp = name.includes('#');

      const key = document.createElement('div');
      key.className = 'key' + (isSharp ? ' sharp' : '');
      key.dataset.code = code;
      key.dataset.midi = midi;
      key.innerHTML =
        `<span class="qwerty">${label}</span>` +
        `<span class="note">${name}</span>` +
        `<span class="oct">${octave}</span>`;
      rowEl.appendChild(key);
      keyEls.set(code, key);

      key.addEventListener('pointerdown', (e) => { e.preventDefault(); noteOn(code); });
      key.addEventListener('pointerup', () => noteOff(code));
      key.addEventListener('pointerleave', () => noteOff(code));
      key.addEventListener('pointercancel', () => noteOff(code));
    });
    board.appendChild(rowEl);
  }

  // ---- Audio ----
  let ctx, master;
  const active = new Map(); // code -> array of voices ({ o1, o2, g })

  // Chord-type modifiers: hold an F-key (or click a chip) to pick a type,
  // then any note key plays that chord rooted on it. Intervals in semitones.
  const CHORDS = { major: [0, 4, 7], minor: [0, 3, 7], dom7: [0, 4, 7, 10], sus4: [0, 5, 7] };
  const CHORD_KEYS = { F1: 'major', F2: 'minor', F3: 'dom7', F4: 'sus4' };
  const heldMods = []; // types held via F-keys, in press order
  let latched = null;  // type latched via chip click
  const activeType = () => heldMods.length ? heldMods[heldMods.length - 1] : latched;

  function initAudio() {
    if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return; }
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const comp = ctx.createDynamicsCompressor();
    master = ctx.createGain();
    master.gain.value = 0.5;
    master.connect(comp);
    comp.connect(ctx.destination);
  }

  const midiToFreq = (m) => 440 * Math.pow(2, (m - 69) / 12);

  function startVoice(freq, peak) {
    const now = ctx.currentTime;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(peak, now + 0.012);        // attack
    g.gain.exponentialRampToValueAtTime(peak * 0.58, now + 0.18);  // decay → sustain
    g.connect(master);

    const o1 = ctx.createOscillator();
    o1.type = 'triangle';
    o1.frequency.value = freq;
    const o2 = ctx.createOscillator();
    o2.type = 'sine';
    o2.frequency.value = freq;
    o2.detune.value = -4; // subtle warmth
    o1.connect(g); o2.connect(g);
    o1.start(); o2.start();
    return { o1, o2, g };
  }

  function stopVoice(v) {
    const now = ctx.currentTime;
    v.g.gain.cancelScheduledValues(now);
    v.g.gain.setValueAtTime(Math.max(v.g.gain.value, 0.0001), now);
    v.g.gain.exponentialRampToValueAtTime(0.0001, now + 0.25); // release
    v.o1.stop(now + 0.3);
    v.o2.stop(now + 0.3);
  }

  function noteOn(code) {
    initAudio();
    if (active.has(code)) return;
    const el = keyEls.get(code);
    if (!el) return;
    const base = Number(el.dataset.midi) + octaveShift * 12;
    const intervals = CHORDS[activeType()] || [0];
    const peak = intervals.length > 1 ? 0.42 : 0.6; // ease level so chords don't spike
    const voices = intervals.map((iv) => startVoice(midiToFreq(base + iv), peak));
    active.set(code, voices);
    el.classList.add('active');
  }

  function noteOff(code) {
    const voices = active.get(code);
    if (!voices) return;
    active.delete(code);
    voices.forEach(stopVoice);
    const el = keyEls.get(code);
    if (el) el.classList.remove('active');
  }

  // ---- Octave shift ----
  const OCT_MIN = -3, OCT_MAX = 2;
  let octaveShift = 0;
  const octReadout = document.getElementById('octReadout');
  const octDownBtn = document.getElementById('octDown');
  const octUpBtn = document.getElementById('octUp');

  function applyShift(delta) {
    const next = Math.max(OCT_MIN, Math.min(OCT_MAX, octaveShift + delta));
    if (next === octaveShift) return;
    octaveShift = next;
    for (const el of keyEls.values()) {
      const midi = Number(el.dataset.midi) + octaveShift * 12;
      el.querySelector('.oct').textContent = Math.floor(midi / 12) - 1;
    }
    octReadout.textContent = octaveShift > 0 ? `+${octaveShift}` : `${octaveShift}`;
    octDownBtn.disabled = octaveShift === OCT_MIN;
    octUpBtn.disabled = octaveShift === OCT_MAX;
  }

  octDownBtn.addEventListener('click', () => applyShift(-1));
  octUpBtn.addEventListener('click', () => applyShift(1));

  // ---- Chord modifier wiring ----
  const chipEls = {};
  document.querySelectorAll('.chip').forEach((chip) => {
    chipEls[chip.dataset.code] = chip;
    chip.addEventListener('click', () => {
      const type = CHORD_KEYS[chip.dataset.code];
      latched = latched === type ? null : type; // click-to-latch toggle
      updateChordUI();
    });
  });

  function updateChordUI() {
    const t = activeType();
    for (const code in chipEls) chipEls[code].classList.toggle('active', CHORD_KEYS[code] === t);
  }
  function pressMod(code) {
    const type = CHORD_KEYS[code];
    if (!heldMods.includes(type)) heldMods.push(type);
    updateChordUI();
  }
  function releaseMod(code) {
    const i = heldMods.indexOf(CHORD_KEYS[code]);
    if (i !== -1) heldMods.splice(i, 1);
    updateChordUI();
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
      e.preventDefault();
      if (!e.repeat) applyShift(e.code === 'ArrowUp' ? 1 : -1);
      return;
    }
    if (CHORD_KEYS[e.code]) {
      e.preventDefault(); // suppress browser help/find on F1–F4
      if (!e.repeat) pressMod(e.code);
      return;
    }
    if (e.repeat) return;
    if (keyEls.has(e.code)) { e.preventDefault(); noteOn(e.code); }
  });
  window.addEventListener('keyup', (e) => {
    if (CHORD_KEYS[e.code]) { releaseMod(e.code); return; }
    if (keyEls.has(e.code)) noteOff(e.code);
  });
  // Release everything if focus is lost mid-hold.
  window.addEventListener('blur', () => { for (const code of [...active.keys()]) noteOff(code); });

  // ---- Help: chord & interval shapes ----
  // Positions are relative to the root as (dr, di): dr = rows up, di = keys right.
  // On this board a whole tone is +1 di, and each row up is a perfect fifth.
  (function buildHelp() {
    const CX = 22, CY = 20, STAGGER = 11, PAD = 10, R_DOT = 3.2, R_HL = 6;
    const pos = (dr, di) => [PAD + (di + 2) * CX - dr * STAGGER + 2 * STAGGER, PAD + (2 - dr) * CY];

    function diagram(notes) {
      const k = (dr, di) => dr + ',' + di;
      const taken = new Set(notes.map(n => k(n.dr, n.di)));
      const root = notes.find(n => n.role === 'root');
      const [rx, ry] = pos(root.dr, root.di);
      let bg = '', lines = '', hl = '';
      for (let dr = 0; dr <= 2; dr++)
        for (let di = -2; di <= 2; di++)
          if (!taken.has(k(dr, di))) {
            const [x, y] = pos(dr, di);
            bg += `<circle cx="${x}" cy="${y}" r="${R_DOT}" fill="#333c4e"/>`;
          }
      for (const n of notes) if (n.role !== 'root') {
        const [x, y] = pos(n.dr, n.di);
        lines += `<line x1="${rx}" y1="${ry}" x2="${x}" y2="${y}" stroke="#5f6b80" stroke-width="2" stroke-linecap="round"/>`;
      }
      for (const n of notes) {
        const [x, y] = pos(n.dr, n.di);
        hl += `<circle cx="${x}" cy="${y}" r="${R_HL}" fill="${n.role === 'root' ? '#ffb454' : '#6c9bff'}"/>`;
      }
      return `<svg viewBox="0 0 130 60">${bg}${lines}${hl}</svg>`;
    }

    const R = { dr: 0, di: 0, role: 'root' };
    const GROUPS = [
      { title: 'Intervals', sep: '→', items: [
        { name: 'Whole tone',  keys: ['Z', 'X'], notes: [R, { dr: 0, di: 1, role: 'note' }] },
        { name: 'Major 3rd',   keys: ['Z', 'C'], notes: [R, { dr: 0, di: 2, role: 'note' }] },
        { name: 'Perfect 4th', keys: ['X', 'A'], notes: [R, { dr: 1, di: -1, role: 'note' }] },
        { name: 'Perfect 5th', keys: ['Z', 'A'], notes: [R, { dr: 1, di: 0, role: 'note' }] },
        { name: 'Octave',      keys: ['C', 'W'], notes: [R, { dr: 2, di: -1, role: 'note' }] },
      ] },
      { title: 'Chords', sep: '+', items: [
        { name: 'Major triad', keys: ['Z', 'C', 'A'], notes: [R, { dr: 0, di: 2, role: 'note' }, { dr: 1, di: 0, role: 'note' }] },
        { name: 'Minor triad', keys: ['C', 'A', 'D'], notes: [R, { dr: 1, di: -2, role: 'note' }, { dr: 1, di: 0, role: 'note' }] },
      ] },
    ];

    const body = document.getElementById('helpBody');
    for (const g of GROUPS) {
      const title = document.createElement('div');
      title.className = 'group-title';
      title.textContent = g.title;
      body.appendChild(title);
      const cards = document.createElement('div');
      cards.className = 'cards';
      for (const it of g.items) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = diagram(it.notes) +
          `<div class="name">${it.name}</div>` +
          `<div class="ex">${it.keys.map(x => `<span>${x}</span>`).join(' ' + g.sep + ' ')}</div>`;
        cards.appendChild(card);
      }
      body.appendChild(cards);
    }
  })();
</script>
</body>
</html>
